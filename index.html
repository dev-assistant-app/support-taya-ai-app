<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <style>
    :root {
      --fg: #111;
      --muted: #555;
      --link: #0a66c2;
      --bg: #fff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #e8e8e8;
        --muted: #a0a0a0;
        --link: #66aaff;
        --bg: #111;
      }
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
            Ubuntu, Cantarell, "Helvetica Neue", Arial, "Apple Color Emoji",
            "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
      -webkit-text-size-adjust: 100%;
    }
    .container {
      max-width: 840px;
      margin: 0 auto;
      padding: 24px;
    }
    header h1 {
      font-size: 1.9rem;
      line-height: 1.25;
      margin: 0 0 0.25rem 0;
      letter-spacing: -0.02em;
    }
    p { margin: 0.75rem 0; }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <h1>Support</h1>
      <p class="muted">We’re here to help.</p>
    </header>

    <section>
      <p>For support, please email <a href="mailto:lyskovets.iulia@ya.ru">lyskovets.iulia@ya.ru</a>.</p>
    </section>
  </main>
</body>
</html>
