<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Страница поддержки — ИИ-ассистент «Тая»</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        line-height: 1.7;
        color: #1a1a1a;
        background-color: #f5f5f5;
        padding: 40px 20px;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        background: #ffffff;
        padding: 60px 50px;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }

      h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 24px;
        color: #1a1a1a;
      }

      p {
        margin-bottom: 16px;
        text-align: justify;
      }

      a {
        color: #1a1a1a;
      }

      @media (max-width: 600px) {
        body {
          padding: 20px 12px;
        }

        .container {
          padding: 30px 20px;
        }

        h1 {
          font-size: 22px;
        }
      }

      @media print {
        body {
          background: #fff;
          padding: 0;
        }

        .container {
          box-shadow: none;
          padding: 40px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Страница поддержки приложения ИИ-ассистент «Тая»</h1>
      <p>
        Для получения поддержки напишите нам на почту <a href="mailto:yskovets.iulia@ya.ru">yskovets.iulia@ya.ru</a>.
      </p>
    </div>
  </body>
</html>
